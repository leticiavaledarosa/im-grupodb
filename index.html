<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inteligência de Mercado – Grupo DB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

  :root {
    --teal: #35B6B4;
    --teal-dark: #006677;
    --navy: #050628;
    --white: #ffffff;
    --bg: #f0f4f8;
    --panel: #ffffff;
    --chat-bg: #f7f9fc;
    --bubble-bot: #ffffff;
    --border: #e2e8f0;
    --text: #0f1a2e;
    --text-muted: #8898aa;
    --green-status: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 10% 0%, #35b6b418 0%, transparent 50%),
      radial-gradient(ellipse at 90% 100%, #00667712 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .phone-frame {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border-radius: 36px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 0 0 1px #e2e8f0, 0 20px 60px #00000014, 0 4px 16px #35b6b412;
    display: flex;
    flex-direction: column;
    height: 88vh;
    max-height: 800px;
  }

  /* HEADER */
  .header-top {
    background: linear-gradient(135deg, var(--navy) 0%, #0a1155 100%);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  /* Robot SVG avatar */
  .robot-avatar {
    width: 52px; height: 52px;
    flex-shrink: 0;
    filter: drop-shadow(0 4px 12px #35b6b450);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
  }

  .header-info { flex: 1; }

  .header-info strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }

  .header-info .status {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 3px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--green-status);
    border-radius: 50%;
    box-shadow: 0 0 6px #22c55e99;
    animation: pulse-green 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 #22c55e66; }
    50% { box-shadow: 0 0 0 4px transparent; }
  }

  .status-text {
    font-size: 11.5px;
    color: var(--green-status);
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .header-logo-strip {
    background: var(--white);
    padding: 9px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .im-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal-dark);
  }

  .grupo-db-badge .name {
    font-size: 11px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: 0.08em;
  }

  .grupo-db-badge .name span { color: var(--teal); }

  /* CHAT */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--chat-bg);
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: #d0dae8; border-radius: 4px; }

  .msg-wrap { display: flex; flex-direction: column; }
  .msg-wrap.user { align-items: flex-end; }

  .bot-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--teal-dark);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    padding-left: 2px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-style: italic;
  }

  .bubble {
    max-width: 86%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.6;
    animation: fadeUp 0.3s ease;
    white-space: pre-line;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble.bot {
    background: var(--white);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 2px 8px #0000000a;
  }

  .bubble.user {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    border-bottom-right-radius: 4px;
    color: #fff;
    box-shadow: 0 4px 12px #35b6b430;
  }

  .bubble .time {
    font-size: 10px;
    text-align: right;
    margin-top: 5px;
    font-family: 'IBM Plex Mono', monospace;
    opacity: 0.45;
  }

  /* OPTIONS */
  .options-area {
    padding: 14px 16px 18px;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }

  .options-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .options-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  .opt-btn {
    background: #f0fafa;
    border: 1.5px solid var(--teal);
    color: var(--teal-dark);
    border-radius: 22px;
    padding: 7px 16px;
    font-size: 12.5px;
    font-weight: 600;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .opt-btn:hover {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: #fff;
    border-color: transparent;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px #35b6b435;
  }

  .opt-btn:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }

  .audio-area { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .audio-hint { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .mic-btn {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    border: none;
    border-radius: 14px;
    padding: 10px 20px;
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    width: fit-content;
    box-shadow: 0 4px 14px #35b6b430;
  }

  .mic-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .mic-btn.recording { background: linear-gradient(135deg, #f43f5e, #be123c); animation: pulse-rec 1s infinite; }

  @keyframes pulse-rec {
    0%, 100% { box-shadow: 0 0 0 0 #f43f5e55; }
    50% { box-shadow: 0 0 0 8px transparent; }
  }

  .text-fallback { display: flex; gap: 8px; }

  .text-input {
    flex: 1;
    background: #f7f9fc;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 9px 16px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .text-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px #35b6b418; }

  .send-btn {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    border: none;
    border-radius: 50%;
    width: 40px; height: 40px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: white;
    box-shadow: 0 4px 12px #35b6b430;
    transition: filter 0.2s, transform 0.2s;
  }

  .send-btn:hover { filter: brightness(1.1); transform: scale(1.05); }

  .summary-card {
    background: #f0fafa;
    border: 1.5px solid var(--teal);
    border-radius: 16px;
    padding: 14px 16px;
    font-size: 12.5px;
    line-height: 2;
    width: 100%;
  }

  .summary-card .row { display: flex; gap: 8px; align-items: baseline; }
  .summary-card .label { color: var(--text-muted); min-width: 110px; font-weight: 500; }
  .summary-card .value { color: var(--text); font-weight: 700; }

  .sheets-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 9px 14px;
    border-radius: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
  }

  .sheets-status.sending { background: #f0f4f8; color: var(--text-muted); border: 1px solid var(--border); }
  .sheets-status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .sheets-status.error   { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.spin { background: var(--teal); animation: spinPulse 1s linear infinite; }
  .dot.ok   { background: #22c55e; }
  .dot.err  { background: #f43f5e; }

  @keyframes spinPulse {
    0%   { box-shadow: 0 0 0 0 #35b6b466; }
    50%  { box-shadow: 0 0 0 5px transparent; }
  }

  .restart-btn {
    margin-top: 4px;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    border-radius: 22px;
    padding: 8px 22px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    align-self: center;
  }

  .restart-btn:hover { border-color: var(--teal); color: var(--teal-dark); }

  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 16px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    animation: fadeUp 0.3s ease;
    box-shadow: 0 2px 8px #0000000a;
  }

  .typing span {
    width: 7px; height: 7px;
    background: var(--teal);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
    40% { transform: translateY(-5px); opacity: 1; }
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- HEADER -->
  <div class="header-top">
    <!-- Custom Robot SVG with Grupo DB palette -->
    <svg class="robot-avatar" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Antenna -->
      <line x1="26" y1="4" x2="26" y2="11" stroke="#35B6B4" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="26" cy="3" r="2.5" fill="#35B6B4"/>
      <!-- Head -->
      <rect x="11" y="11" width="30" height="22" rx="7" fill="#006677"/>
      <rect x="12" y="12" width="28" height="20" rx="6" fill="url(#headGrad)"/>
      <!-- Eyes -->
      <rect x="17" y="17" width="7" height="7" rx="3.5" fill="#35B6B4"/>
      <rect x="28" y="17" width="7" height="7" rx="3.5" fill="#35B6B4"/>
      <circle cx="20.5" cy="20.5" r="2" fill="#ffffff"/>
      <circle cx="31.5" cy="20.5" r="2" fill="#ffffff"/>
      <circle cx="21.5" cy="19.5" r="0.8" fill="#050628"/>
      <circle cx="32.5" cy="19.5" r="0.8" fill="#050628"/>
      <!-- Mouth -->
      <rect x="19" y="27" width="14" height="3" rx="1.5" fill="#35B6B4" opacity="0.7"/>
      <rect x="21" y="27" width="3" height="3" rx="0.5" fill="#ffffff" opacity="0.5"/>
      <rect x="25" y="27" width="3" height="3" rx="0.5" fill="#ffffff" opacity="0.5"/>
      <!-- Ears -->
      <rect x="7" y="17" width="4" height="8" rx="2" fill="#006677"/>
      <rect x="41" y="17" width="4" height="8" rx="2" fill="#006677"/>
      <!-- Body -->
      <rect x="14" y="34" width="24" height="14" rx="5" fill="#006677"/>
      <rect x="15" y="35" width="22" height="12" rx="4" fill="url(#bodyGrad)"/>
      <!-- Chest light -->
      <circle cx="26" cy="41" r="3" fill="#35B6B4" opacity="0.9"/>
      <circle cx="26" cy="41" r="1.5" fill="#ffffff" opacity="0.8"/>
      <!-- Side buttons -->
      <circle cx="20" cy="41" r="1.5" fill="#35B6B4" opacity="0.5"/>
      <circle cx="32" cy="41" r="1.5" fill="#35B6B4" opacity="0.5"/>
      <!-- Arms stubs -->
      <rect x="8" y="35" width="5" height="10" rx="2.5" fill="#006677"/>
      <rect x="39" y="35" width="5" height="10" rx="2.5" fill="#006677"/>
      <!-- Gradients -->
      <defs>
        <linearGradient id="headGrad" x1="11" y1="11" x2="41" y2="33" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0a1155"/>
          <stop offset="100%" stop-color="#050628"/>
        </linearGradient>
        <linearGradient id="bodyGrad" x1="14" y1="34" x2="38" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0a1155"/>
          <stop offset="100%" stop-color="#050628"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="header-info">
      <strong>Inteligência de Mercado</strong>
      <div class="status">
        <div class="status-dot"></div>
        <span class="status-text">Robô Ativo</span>
      </div>
    </div>
  </div>

  <div class="header-logo-strip">
    <span class="im-title">Canal IM · Grupo DB</span>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="options-area" id="options-area">
    <div class="options-label" id="options-label">Escolha uma opção</div>
    <div class="options-grid" id="options-grid"></div>
  </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx3QrZ98LTK2wrnFL6jOx9Hiu1aKPQrLxiNQdX-1TNplbx1m5NBmvMiP_5a_1s9jBVmsQ/exec';

const chat = document.getElementById('chat');
const optionsGrid = document.getElementById('options-grid');
const optionsLabel = document.getElementById('options-label');
const answers = {};
let mediaRecorder = null, audioChunks = [], isRecording = false;

function getTime() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function addBubble(text, type = 'bot') {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${type}`;
  if (type === 'bot') {
    const label = document.createElement('div');
    label.className = 'bot-label';
    label.textContent = 'Inteligência de Mercado';
    wrap.appendChild(label);
  }
  const b = document.createElement('div');
  b.className = `bubble ${type}`;
  b.textContent = text;
  const t = document.createElement('div');
  t.className = 'time';
  t.textContent = getTime();
  b.appendChild(t);
  wrap.appendChild(b);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
  return t;
}

function botSay(text, delay = 800) {
  return new Promise(resolve => {
    const typing = addTyping();
    setTimeout(() => { typing.remove(); addBubble(text); resolve(); }, delay);
  });
}

function showOptions(label, options, onSelect) {
  optionsLabel.textContent = label;
  optionsGrid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      optionsGrid.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      addBubble(opt, 'user');
      onSelect(opt);
    };
    optionsGrid.appendChild(btn);
  });
}

function showAudioStep(onDone) {
  optionsLabel.textContent = 'Áudio ou texto — sua escolha';
  optionsGrid.innerHTML = '';
  const area = document.createElement('div');
  area.className = 'audio-area';

  const hint = document.createElement('div');
  hint.className = 'audio-hint';
  hint.textContent = '🎙️ Grave um áudio — ele será transcrito automaticamente. Ou escreva abaixo:';
  area.appendChild(hint);

  const liveBox = document.createElement('div');
  liveBox.style.cssText = `
    background: #f0fafa;
    border: 1.5px solid var(--teal);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: #006677;
    min-height: 48px;
    line-height: 1.5;
    font-style: italic;
    display: none;
  `;
  area.appendChild(liveBox);

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = true;
    recognition.interimResults = true;

    let finalTranscript = '';

    const micBtn = document.createElement('button');
    micBtn.className = 'mic-btn';
    micBtn.innerHTML = '🎤 Iniciar gravação';

    micBtn.onclick = () => {
      if (!isRecording) {
        finalTranscript = '';
        liveBox.style.display = 'block';
        liveBox.textContent = '🔴 Ouvindo... fale agora!';
        recognition.start();
        isRecording = true;
        micBtn.className = 'mic-btn recording';
        micBtn.innerHTML = '⏹️ Parar e transcrever';
      } else {
        recognition.stop();
      }
    };

    recognition.onresult = (e) => {
      finalTranscript = '';
      let interim = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      liveBox.textContent = (finalTranscript + interim) || '🔴 Ouvindo...';
    };

    recognition.onend = () => {
      isRecording = false;
      micBtn.className = 'mic-btn';
      const texto = finalTranscript.trim();
      if (texto) {
        micBtn.innerHTML = '✅ Transcrito!';
        micBtn.disabled = true;
        liveBox.style.fontStyle = 'normal';
        liveBox.style.color = '#0f1a2e';
        liveBox.textContent = `"${texto}"`;
        addBubble(`🎤 "${texto}"`, 'user');
        answers.descricao = texto;
        setTimeout(() => onDone(texto), 700);
      } else {
        micBtn.innerHTML = '🎤 Tentar novamente';
        liveBox.textContent = '⚠️ Nada captado. Tente falar mais perto do microfone.';
      }
    };

    recognition.onerror = (e) => {
      isRecording = false;
      micBtn.className = 'mic-btn';
      micBtn.innerHTML = '🎤 Tentar novamente';
      liveBox.textContent = '⚠️ Erro: ' + (e.error === 'not-allowed' ? 'Permissão de microfone negada.' : 'Tente novamente.');
    };

    area.appendChild(micBtn);

  } else {
    const warning = document.createElement('div');
    warning.className = 'audio-hint';
    warning.style.color = '#f43f5e';
    warning.textContent = '⚠️ Seu navegador não suporta gravação. Por favor escreva abaixo.';
    area.appendChild(warning);
  }

  const divider = document.createElement('div');
  divider.style.cssText = 'font-size:11px; color:var(--text-muted); text-align:center; margin: 4px 0;';
  divider.textContent = '— ou escreva abaixo —';
  area.appendChild(divider);

  const row = document.createElement('div');
  row.className = 'text-fallback';
  const input = document.createElement('input');
  input.className = 'text-input';
  input.placeholder = 'Escreva aqui...';
  const sendBtn = document.createElement('button');
  sendBtn.className = 'send-btn';
  sendBtn.innerHTML = '➤';
  sendBtn.onclick = () => {
    if (!input.value.trim()) return;
    addBubble(input.value, 'user');
    answers.descricao = input.value;
    onDone(input.value);
  };
  input.onkeydown = e => { if (e.key === 'Enter') sendBtn.click(); };
  row.appendChild(input);
  row.appendChild(sendBtn);
  area.appendChild(row);
  optionsGrid.appendChild(area);
}

async function enviarParaSheets(dados) {
  optionsLabel.textContent = 'Salvando no Google Sheets...';
  optionsGrid.innerHTML = '';
  const status = document.createElement('div');
  status.className = 'sheets-status sending';
  status.innerHTML = '<div class="dot spin"></div> Enviando para a planilha...';
  optionsGrid.appendChild(status);
  try {
    const params = new URLSearchParams(dados);
    await fetch(`${SHEETS_URL}?${params.toString()}`, { mode: 'no-cors' });
    status.className = 'sheets-status success';
    status.innerHTML = '<div class="dot ok"></div> ✅ Salvo no Google Sheets!';
  } catch {
    status.className = 'sheets-status error';
    status.innerHTML = '<div class="dot err"></div> ❌ Erro ao salvar.';
  }
}

function showSummary() {
  const card = document.createElement('div');
  card.className = 'summary-card';
  card.innerHTML = `
    <div class="row"><span class="label">😊 Nome</span><span class="value">${answers.nome}</span></div>
    <div class="row"><span class="label">📋 Função</span><span class="value">${answers.funcao}</span></div>
    <div class="row"><span class="label">📡 Origem</span><span class="value">${answers.origem}</span></div>
    <div class="row"><span class="label">🏷️ Tipo</span><span class="value">${answers.tipo}</span></div>
    <div class="row"><span class="label">🏢 Concorrente</span><span class="value">${answers.concorrente}</span></div>
    <div class="row"><span class="label">📍 Região</span><span class="value">${answers.regiao}</span></div>
    <div class="row"><span class="label">📝 Relato</span><span class="value">${answers.descricao}</span></div>
    <div class="row"><span class="label">🎯 Confiabilidade</span><span class="value">${answers.confiabilidade}</span></div>
  `;
  optionsGrid.appendChild(card);
  const restart = document.createElement('button');
  restart.className = 'restart-btn';
  restart.textContent = '↺ Novo registro';
  restart.onclick = () => location.reload();
  optionsGrid.appendChild(restart);
}

async function runFlow() {
  await botSay('🤖 Olá! Esse é o canal de Inteligência de Mercado do Grupo DB. Vamos registrar sua informação!', 1000);

  // Campo nome
  await botSay('😊 Primeiro, qual é o seu nome e sobrenome?', 700);
  optionsLabel.textContent = 'Digite seu nome';
  optionsGrid.innerHTML = '';
  const nomeArea = document.createElement('div');
  nomeArea.className = 'text-fallback';
  const nomeInput = document.createElement('input');
  nomeInput.className = 'text-input';
  nomeInput.placeholder = 'Nome e sobrenome...';
  nomeInput.autofocus = true;
  const nomeSendBtn = document.createElement('button');
  nomeSendBtn.className = 'send-btn';
  nomeSendBtn.innerHTML = '➤';
  nomeSendBtn.onclick = async () => {
    if (!nomeInput.value.trim()) return;
    addBubble(nomeInput.value, 'user');
    answers.nome = nomeInput.value.trim();
    optionsGrid.innerHTML = '';
    await botSay(`👋 Olá, ${answers.nome.split(' ')[0]}! Vamos começar.`, 700);
    await botSay('👤 Qual é a sua função?', 600);
    continuarFluxo();
  };
  nomeInput.onkeydown = e => { if (e.key === 'Enter') nomeSendBtn.click(); };
  nomeArea.appendChild(nomeInput);
  nomeArea.appendChild(nomeSendBtn);
  optionsGrid.appendChild(nomeArea);
}

function continuarFluxo() {
  showOptions('Selecione sua função', ['Gerência', 'Supervisor', 'Representante', 'Outros'], async (val) => {
    answers.funcao = val;
    await botSay('📡 Como essa informação chegou até você?', 700);
    showOptions('Origem da informação', [
      'Observação direta (visita, evento, congresso)',
      'Relato de cliente ou parceiro',
      'Relato de colega / equipe interna',
      'Redes sociais / LinkedIn',
      'Publicação, notícia ou relatório'
    ], async (val) => {
      answers.origem = val;
      await botSay('🏷️ Que tipo de informação você quer compartilhar?', 700);
      showOptions('Tipo de informação', ['Mercado & Concorrência', 'Manifestações de Clientes', 'Produtos & Soluções'], async (val) => {
        answers.tipo = val;
        await botSay('🏢 Tem relação com algum concorrente?', 700);
        showOptions('Concorrente', ['Álvaro/Dasa', 'Pardini/Fleury', 'AFIP', 'Não se aplica'], async (val) => {
          answers.concorrente = val;
          await botSay('📍 Qual região?', 700);
          showOptions('Região', ['Nordeste', 'Norte', 'Centro-Oeste', 'Sul', 'Sudeste', 'Nacional'], async (val) => {
            answers.regiao = val;
            await botSay('🎙️ Agora me conta o que aconteceu! Pode mandar um áudio com todos os detalhes — ou escrever abaixo. 📝', 800);
            showAudioStep(async () => {
              await botSay('🎯 Qual o nível de confiabilidade dessa informação?', 800);
              showOptions('Confiabilidade', ['Confiável', 'Média confiança', 'Rumor', 'Não verificado'], async (val) => {
                answers.confiabilidade = val;
                await botSay(`✅ Informação registrada com sucesso!\n\n👤 ${answers.nome}  |  📋 ${answers.funcao}\n📡 ${answers.origem}\n🏢 ${answers.concorrente}  |  📍 ${answers.regiao}\n🎯 Confiabilidade: ${answers.confiabilidade}\n\nObrigado pela contribuição, equipe IM - Grupo DB! 🙌`, 1000);
                optionsLabel.textContent = '';
                optionsGrid.innerHTML = '';
                await enviarParaSheets(answers);
                showSummary();
              });
            });
          });
        });
      });
    });
  });
}

runFlow();
</script>
</body>
</html>
